# ──────────────────────────────────────────────
#  General
# ──────────────────────────────────────────────

# Use 256 colors + true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Increase scrollback buffer
set -g history-limit 100000

# Start windows and panes at 1 (easier keyboard reach)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# No delay for escape key
set -sg escape-time 0

# ──────────────────────────────────────────────
#  Mouse support
# ──────────────────────────────────────────────

set -g mouse on   # click to select panes/windows, scroll, resize panes

# ──────────────────────────────────────────────
#  Prefix key  (Ctrl-a, like screen — easier than Ctrl-b)
# ──────────────────────────────────────────────

unbind C-b
set -g prefix C-a
bind C-a send-prefix   # press Ctrl-a twice to send it to the shell

# ──────────────────────────────────────────────
#  Splits  (intuitive keys, open in current path)
# ──────────────────────────────────────────────

bind | split-window -h -c "#{pane_current_path}"   # vertical split
bind - split-window -v -c "#{pane_current_path}"   # horizontal split
unbind '"'
unbind %

# ──────────────────────────────────────────────
#  Pane navigation  (vim-style)
# ──────────────────────────────────────────────

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ──────────────────────────────────────────────
#  Pane resizing  (hold prefix + arrow)
# ──────────────────────────────────────────────

bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Down  resize-pane -D 5
bind -r Up    resize-pane -U 5

# ──────────────────────────────────────────────
#  Copy mode  (vim keys)
# ──────────────────────────────────────────────

setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ──────────────────────────────────────────────
#  Status bar
# ──────────────────────────────────────────────

set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left " #[fg=#89b4fa,bold]#S #[fg=#585b70]│ "
set -g status-left-length 30

set -g status-right "#[fg=#585b70]│ #[fg=#a6e3a1]%H:%M #[fg=#585b70]│ #[fg=#89dceb]%d %b"
set -g status-right-length 40

setw -g window-status-format         " #[fg=#585b70]#I:#W "
setw -g window-status-current-format " #[fg=#89b4fa,bold]#I:#W "

# ──────────────────────────────────────────────
#  Plugins
# ──────────────────────────────────────────────

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'        # auto-restore on tmux start
set -g @continuum-save-interval '10'  # save every 10 minutes

run '~/.local/share/tmux/plugins/tmux-resurrect/resurrect.tmux'
run '~/.local/share/tmux/plugins/tmux-continuum/continuum.tmux'

# ──────────────────────────────────────────────
#  Misc
# ──────────────────────────────────────────────

# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Open new window in current path
bind c new-window -c "#{pane_current_path}"
